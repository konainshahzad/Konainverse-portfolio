{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Portfolio{% endblock %}</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{% static 'portfolio_app/css/style.css' %}">
  {% block extra_head %}{% endblock %}
</head>
<body>

  <header class="site-header">
    <div class="header-inner wrap">
      <a href="{% url 'home' %}" class="logo">&lt;Konainverse<span>/</span>&gt;</a>

      <nav class="tab-nav" aria-label="Main navigation">
        <a href="{% url 'home' %}" class="{% block nav_home %}{% endblock %}">home</a>
        <a href="{% url 'projects' %}" class="{% block nav_projects %}{% endblock %}">projects</a>
        <a href="{% url 'contact' %}" class="{% block nav_contact %}{% endblock %}">contact</a>
      </nav>
    </div>
  </header>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <div class="footer-inner wrap">
      <span>&copy; {% now "Y" %} Konain. Built with Django.</span>
      <div class="social-row">
        <a href="https://github.com/konainshahzad" aria-label="GitHub">GH</a>
        <a href="https://www.linkedin.com/in/konainshahzad/" aria-label="LinkedIn">IN</a>
        <a href="konainshahzad786@gmail.com" aria-label="Email">@</a>
      </div>
    </div>
  </footer>

</body>
</html>
